<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting to App...</title>
    <script type="text/javascript">
        // The new destination domain
        var targetDomain = "https://app.weatherate.com";

        // Get the current path (e.g., /forecast_bulk_entry/1/2026/5/3/)
        var currentPath = window.location.pathname;
        var currentSearch = window.location.search;

        // Construct the new URL
        var newUrl = targetDomain + currentPath + currentSearch;

        // Execute the redirect
        // We use .replace() so the 404 page doesn't stay in the browser history
        window.location.replace(newUrl);
    </script>
</head>
<body>
    <p>Redirecting to the application... If you are not redirected, <a id="manual-link" href="https://app.weatherate.com">click here</a>.</p>
    <script>
        // Fallback: update the manual link text just in case
        document.getElementById('manual-link').href = "https://app.weatherate.com" + window.location.pathname;
    </script>
</body>
</html>
